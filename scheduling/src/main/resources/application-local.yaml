spring:
  datasource:
    url: jdbc:h2:mem:scheduling;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  profiles:
    active: default, local

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    default-models-expand-depth: -1
    urls-primary-name: Scheduling API
    urls:
      - name: Scheduling API
        url: /scheduling-openapi.yaml

logging:
  level:
    org.hibernate.SQL: info
